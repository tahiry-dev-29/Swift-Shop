# Trunk config — TypeScript & Dart only
# https://docs.trunk.io/reference/trunk-yaml
version: 0.1
cli:
  version: 1.25.0

plugins:
  sources:
    - id: trunk
      ref: v1.10.2
      uri: https://github.com/trunk-io/plugins

# Only Node runtime for TypeScript — Dart is managed as a download by trunk plugin
runtimes:
  enabled:
    - node@22.16.0

# TS/Dart focused linters only
lint:
  enabled:
    - actionlint@1.7.12
    - checkov@3.2.533
    - dotenv-linter@4.0.0
    - git-diff-check
    # grype — runs on CI only (too slow locally, scans pnpm-lock.yaml)
    # - grype@0.114.0
    - hadolint@2.14.0
    - markdownlint@0.48.0
    # osv-scanner — runs on CI only (slow remote DB lookup)
    # - osv-scanner@2.3.8
    - pinact@4.0.0
    - prettier@3.8.3
    - shellcheck@0.11.0
    - shfmt@3.6.0
    - eslint@9.28.0
    - taplo@0.10.0
    - trufflehog@3.95.5
    - yamllint@1.38.0
  disabled:
    # Python ecosystem
    - bandit
    - black
    - isort
    - pylint
    - ruff
    - autopep8
    # Vulnerability scanners — CI only (slow remote DB fetch + lock file scan)
    - grype
    - osv-scanner
    # Other languages
    - clippy # Rust
    - buf # Protobuf
    - buildifier # Bazel
    - detekt # Kotlin
    - brakeman # Ruby
    - ansible-lint # Ansible
    - cspell # Spelling (heavy)
    - codespell # Spelling
    - cfnlint # CloudFormation
    # Config formats

  # ESLint respects project eslint.config.mjs / .eslintrc
  definitions: []

  # Ignore generated/vendor directories
  # Note: Trunk automatically respects your project's .gitignore files.
  # Any file ignored by git will NOT be linted by Trunk.
  # Use this ignore section ONLY for files you track in git but don't want to lint.
  ignore:
    - linters: [ALL]
      paths:
        - '**/*.min.js'
        - '**/*.generated.ts'
        - '**/generated/**'
        - '**/*.g.dart'
        - '**/*.freezed.dart'
        - .agents/**

actions:
  enabled:
    - trunk-announce
    - trunk-check-pre-push # Lint on git push
    - trunk-fmt-pre-commit # Format on git commit
    - trunk-upgrade-available # Notify when updates available
